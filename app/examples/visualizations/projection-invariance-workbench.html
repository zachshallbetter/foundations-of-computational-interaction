&lt;div id=&quot;cis-projection-workbench&quot; data-example-id=&quot;CIS-EX-004&quot; data-theory-version=&quot;1.0.0&quot;&gt;

  &lt;div class=&quot;pi-identity text-small text-muted&quot;&gt;&lt;code&gt;CIS-EX-004&lt;/code&gt;&lt;span&gt;Projection and invariance workbench&lt;/span&gt;&lt;span&gt;·&lt;/span&gt;&lt;span&gt;Theory Version 1.0.0&lt;/span&gt;&lt;/div&gt;

  &lt;div class=&quot;pi-controls&quot; aria-label=&quot;Projection B controls&quot;&gt;

    &lt;label class=&quot;form-check form-switch&quot;&gt;&lt;input class=&quot;form-check-input&quot; id=&quot;pi-summary&quot; type=&quot;checkbox&quot;&gt;&lt;span class=&quot;form-check-label&quot;&gt;Introduce summary label&lt;/span&gt;&lt;/label&gt;
  &lt;/div&gt;

  &lt;div class=&quot;pi-stage&quot;&gt;
    &lt;section class=&quot;card pi-card&quot; data-kind=&quot;target&quot; aria-label=&quot;Declared target state&quot;&gt;
      &lt;div class=&quot;pi-label&quot;&gt;Target state · authority&lt;/div&gt;
      &lt;div class=&quot;pi-field-list&quot;&gt;
        &lt;div class=&quot;pi-field&quot;&gt;&lt;strong&gt;temperature_c&lt;/strong&gt;&lt;span&gt;20&lt;/span&gt;&lt;/div&gt;

        &lt;div class=&quot;pi-field&quot;&gt;&lt;strong&gt;temperature_c&lt;/strong&gt;&lt;span&gt;20 · preserved&lt;/span&gt;&lt;/div&gt;

  &lt;section aria-label=&quot;Typed comparison results&quot;&gt;
    &lt;div class=&quot;pi-results&quot; id=&quot;pi-results&quot;&gt;&lt;/div&gt;

  &lt;/section&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;cis-projection-workbench&#x27;);
      const $ = selector =&gt; root.querySelector(selector);
      function render() {
        const temperature = $(&#x27;#pi-temperature&#x27;).value;
        const alarm = $(&#x27;#pi-alarm&#x27;).checked;
        const summary = $(&#x27;#pi-summary&#x27;).checked;
        const fields = [];
        if (temperature === &#x27;celsius&#x27;) fields.push([&#x27;temperature_c&#x27;, &#x27;20 · preserved&#x27;, &#x27;preserved&#x27;]);
        if (temperature === &#x27;fahrenheit&#x27;) fields.push([&#x27;temperature_f&#x27;, &#x27;68 · transformed&#x27;, &#x27;transformed&#x27;]);
        if (temperature === &#x27;omit&#x27;) fields.push([&#x27;temperature&#x27;, &#x27;omitted&#x27;, &#x27;omitted&#x27;]);
        fields.push(alarm ? [&#x27;alarm&#x27;, &#x27;active · preserved&#x27;, &#x27;preserved&#x27;] : [&#x27;alarm&#x27;, &#x27;omitted&#x27;, &#x27;omitted&#x27;]);
        fields.push([&#x27;mode&#x27;, &#x27;omitted&#x27;, &#x27;omitted&#x27;]);
        if (summary) fields.push([&#x27;summary&#x27;, &#x27;attention required · introduced&#x27;, &#x27;introduced&#x27;]);
        $(&#x27;#pi-projection-b&#x27;).innerHTML = fields.map(([name, value, kind]) =&gt;
          `&lt;div class=&quot;pi-field&quot; data-kind=&quot;${kind}&quot;&gt;&lt;strong&gt;${name}&lt;/strong&gt;&lt;span&gt;${value}&lt;/span&gt;&lt;/div&gt;`
        ).join(&#x27;&#x27;);

        const temperatureComparable = temperature !== &#x27;omit&#x27;;
        const alarmComparable = alarm;
        const anyCommon = temperatureComparable || alarmComparable;
        const structureEquivalent = temperature === &#x27;celsius&#x27; &amp;&amp; alarm &amp;&amp; !summary;
        const informationPreserved = temperatureComparable;
        const taskInvariant = alarmComparable;
        const results = [
          [&#x27;Common space&#x27;, anyCommon, anyCommon ? &#x27;at least one mapped observable&#x27; : &#x27;no mapped observables&#x27;],
          [&#x27;Temperature&#x27;, informationPreserved, temperature === &#x27;fahrenheit&#x27; ? &#x27;preserved after inverse transform&#x27; : temperatureComparable ? &#x27;preserved directly&#x27; : &#x27;not comparable&#x27;],
          [&#x27;Alarm task&#x27;, taskInvariant, taskInvariant ? &#x27;decision signal preserved&#x27; : &#x27;task evidence omitted&#x27;],
          [&#x27;Structure&#x27;, structureEquivalent, structureEquivalent ? &#x27;same fields and kinds&#x27; : &#x27;representation differs&#x27;]
        ];
        $(&#x27;#pi-results&#x27;).innerHTML = results.map(([label, on, detail]) =&gt;
          `&lt;div class=&quot;pi-result&quot; data-on=&quot;${on}&quot;&gt;&lt;strong&gt;${on ? &#x27;✓&#x27; : &#x27;×&#x27;} ${label}&lt;/strong&gt;&lt;span&gt;${detail}&lt;/span&gt;&lt;/div&gt;`
        ).join(&#x27;&#x27;);
        if (!anyCommon) {
          $(&#x27;#pi-verdict&#x27;).textContent = &#x27;Incomparable: no defensible correspondence remains between the projections.&#x27;;
        } else if (structureEquivalent) {
          $(&#x27;#pi-verdict&#x27;).textContent = &#x27;Exact projection equivalence holds for this declared field contract; mode remains jointly omitted.&#x27;;
        } else {
          const scope = [informationPreserved ? &#x27;temperature information&#x27; : &#x27;&#x27;, taskInvariant ? &#x27;alarm task&#x27; : &#x27;&#x27;].filter(Boolean).join(&#x27; and &#x27;);
          $(&#x27;#pi-verdict&#x27;).textContent = `Partial scoped invariance${scope ? `: ${scope} preserved` : &#x27;&#x27;}. No overall equivalence claim is licensed.`;
        }
      }
      root.querySelectorAll(&#x27;select, input&#x27;).forEach(control =&gt; control.addEventListener(&#x27;input&#x27;, render));
      render();
    })();
  &lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
