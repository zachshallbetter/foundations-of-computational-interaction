.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {

.btn:not(.btn-primary, .viz-tile):is(

  border-color: var(--primary);

  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;cis-evidence-ladder&quot; data-example-id=&quot;CIS-EX-005&quot; data-theory-version=&quot;1.0.0&quot;&gt;
  &lt;style&gt;
    #cis-evidence-ladder { color: var(--foreground); display: grid; gap: 18px; }
    #cis-evidence-ladder .el-identity { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    #cis-evidence-ladder .el-path { display: flex; align-items: center; justify-content: center; gap: 7px; flex-wrap: wrap; color: var(--muted-foreground); }
    #cis-evidence-ladder .el-path strong { color: var(--foreground); font-weight: 500; }
    #cis-evidence-ladder .el-controls { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px 16px; }
    #cis-evidence-ladder .el-record { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 7px; }
    #cis-evidence-ladder .el-record-item { display: grid; gap: 2px; padding: 9px; background: var(--muted); border-radius: 6px; }
    #cis-evidence-ladder .el-record-item span { color: var(--muted-foreground); font-size: 11px; }
    #cis-evidence-ladder .el-record-item strong { font-weight: 500; }
    #cis-evidence-ladder .el-ladder { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px 16px; align-items: stretch; }
    #cis-evidence-ladder .el-level { min-height: 88px; display: grid; align-content: space-between; gap: 7px; padding: 8px 0; border-top: 2px solid var(--border); color: var(--muted-foreground); }
    #cis-evidence-ladder .el-level[data-reached=&quot;true&quot;] { background: color-mix(in srgb, var(--primary) 14%, var(--card)); color: var(--foreground); }
    #cis-evidence-ladder .el-level[data-frontier=&quot;true&quot;] { border-top-color: var(--primary); }
    #cis-evidence-ladder .el-number { font-size: 11px; color: var(--muted-foreground); }
    #cis-evidence-ladder .el-level strong { font-weight: 500; }
    #cis-evidence-ladder .el-level span:last-child { font-size: 11px; }
    #cis-evidence-ladder .el-claim { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: center; }
    #cis-evidence-ladder .el-claim strong { font-weight: 500; }
    #cis-evidence-ladder .el-block { color: var(--destructive); }
    #cis-evidence-ladder .el-section-label { color: var(--muted-foreground); font-size: 11px; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; }
    @media (max-width: 620px) {
      #cis-evidence-ladder .el-controls { grid-template-columns: 1fr 1fr; }
      #cis-evidence-ladder .el-record { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      #cis-evidence-ladder .el-ladder { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 380px) {
      #cis-evidence-ladder .el-controls { grid-template-columns: 1fr; }
      #cis-evidence-ladder .el-ladder { grid-template-columns: 1fr; }
    }
  &lt;/style&gt;

  &lt;div class=&quot;el-identity text-small text-muted&quot;&gt;&lt;code&gt;CIS-EX-005&lt;/code&gt;&lt;span&gt;Evidence and inference ladder&lt;/span&gt;&lt;span&gt;·&lt;/span&gt;&lt;span&gt;Measurement Handbook&lt;/span&gt;&lt;/div&gt;
  &lt;div class=&quot;el-path text-small&quot; aria-label=&quot;Evidence sequence&quot;&gt;&lt;strong&gt;What was recorded?&lt;/strong&gt;&lt;span&gt;→&lt;/span&gt;&lt;strong&gt;What was established?&lt;/strong&gt;&lt;span&gt;→&lt;/span&gt;&lt;strong&gt;How far may the claim go?&lt;/strong&gt;&lt;/div&gt;

  &lt;div class=&quot;el-section-label&quot;&gt;Recorded event · fixed input&lt;/div&gt;
  &lt;div class=&quot;el-record&quot; aria-label=&quot;Raw event record&quot;&gt;
    &lt;div class=&quot;el-record-item&quot;&gt;&lt;span&gt;record_type&lt;/span&gt;&lt;strong&gt;control.activate&lt;/strong&gt;&lt;/div&gt;
    &lt;div class=&quot;el-record-item&quot;&gt;&lt;span&gt;participant&lt;/span&gt;&lt;strong&gt;P-017&lt;/strong&gt;&lt;/div&gt;
    &lt;div class=&quot;el-record-item&quot;&gt;&lt;span&gt;latency&lt;/span&gt;&lt;strong&gt;240 ms&lt;/strong&gt;&lt;/div&gt;
    &lt;div class=&quot;el-record-item&quot;&gt;&lt;span&gt;result&lt;/span&gt;&lt;strong&gt;completed&lt;/strong&gt;&lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;el-section-label&quot;&gt;Evidence gates · each licenses only the next level&lt;/div&gt;
  &lt;div class=&quot;el-controls&quot; aria-label=&quot;Evidence gates&quot;&gt;
    &lt;label class=&quot;form-check form-switch&quot;&gt;&lt;input class=&quot;form-check-input&quot; id=&quot;el-verified&quot; type=&quot;checkbox&quot;&gt;&lt;span class=&quot;form-check-label&quot;&gt;Instrument verified&lt;/span&gt;&lt;/label&gt;
    &lt;label class=&quot;form-check form-switch&quot;&gt;&lt;input class=&quot;form-check-input&quot; id=&quot;el-coded&quot; type=&quot;checkbox&quot;&gt;&lt;span class=&quot;form-check-label&quot;&gt;Coding independently checked&lt;/span&gt;&lt;/label&gt;
    &lt;label class=&quot;form-check form-switch&quot;&gt;&lt;input class=&quot;form-check-input&quot; id=&quot;el-derived&quot; type=&quot;checkbox&quot;&gt;&lt;span class=&quot;form-check-label&quot;&gt;Estimator preregistered&lt;/span&gt;&lt;/label&gt;
    &lt;label class=&quot;form-check form-switch&quot;&gt;&lt;input class=&quot;form-check-input&quot; id=&quot;el-model&quot; type=&quot;checkbox&quot;&gt;&lt;span class=&quot;form-check-label&quot;&gt;Model calibrated&lt;/span&gt;&lt;/label&gt;
    &lt;label class=&quot;form-check form-switch&quot;&gt;&lt;input class=&quot;form-check-input&quot; id=&quot;el-valid&quot; type=&quot;checkbox&quot;&gt;&lt;span class=&quot;form-check-label&quot;&gt;Construct validity supported&lt;/span&gt;&lt;/label&gt;
    &lt;label class=&quot;form-check form-switch&quot;&gt;&lt;input class=&quot;form-check-input&quot; id=&quot;el-causal&quot; type=&quot;checkbox&quot;&gt;&lt;span class=&quot;form-check-label&quot;&gt;Causal alternatives tested&lt;/span&gt;&lt;/label&gt;
    &lt;label class=&quot;form-check form-switch&quot;&gt;&lt;input class=&quot;form-check-input&quot; id=&quot;el-replicated&quot; type=&quot;checkbox&quot;&gt;&lt;span class=&quot;form-check-label&quot;&gt;Scope independently replicated&lt;/span&gt;&lt;/label&gt;
  &lt;/div&gt;

  &lt;div class=&quot;el-ladder&quot; id=&quot;el-ladder&quot; aria-label=&quot;Eight evidence levels&quot;&gt;&lt;/div&gt;
  &lt;div class=&quot;el-claim&quot; aria-live=&quot;polite&quot;&gt;
    &lt;div&gt;&lt;div class=&quot;el-section-label&quot;&gt;Highest defensible statement&lt;/div&gt;&lt;strong id=&quot;el-claim&quot;&gt;&lt;/strong&gt;&lt;/div&gt;
    &lt;div class=&quot;text-small el-block&quot; id=&quot;el-block&quot;&gt;&lt;/div&gt;
  &lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;cis-evidence-ladder&#x27;);
      const $ = selector =&gt; root.querySelector(selector);
      const levels = [
        [&#x27;Raw record&#x27;, &#x27;The instrument emitted this row.&#x27;, &#x27;record exists&#x27;],
        [&#x27;Verified observation&#x27;, &#x27;Activation and latency were observed.&#x27;, &#x27;verify instrument&#x27;],
        [&#x27;Coded observation&#x27;, &#x27;The event satisfies the declared action code.&#x27;, &#x27;check coding&#x27;],
        [&#x27;Derived measure&#x27;, &#x27;Observed activation latency is 240 ms.&#x27;, &#x27;preregister estimator&#x27;],
        [&#x27;Model estimate&#x27;, &#x27;Estimated latency for this task is model-bounded.&#x27;, &#x27;calibrate model&#x27;],
        [&#x27;Construct evidence&#x27;, &#x27;Results support the declared construct in this scope.&#x27;, &#x27;support validity&#x27;],
        [&#x27;Mechanism evidence&#x27;, &#x27;The tested intervention affected the proposed pathway.&#x27;, &#x27;test alternatives&#x27;],
        [&#x27;Generalized claim&#x27;, &#x27;The bounded result transports to the replicated scope.&#x27;, &#x27;replicate scope&#x27;]
      ];
      const gateIds = [&#x27;el-verified&#x27;, &#x27;el-coded&#x27;, &#x27;el-derived&#x27;, &#x27;el-model&#x27;, &#x27;el-valid&#x27;, &#x27;el-causal&#x27;, &#x27;el-replicated&#x27;];
      function render() {
        let highest = 1;
        for (let index = 0; index &lt; gateIds.length; index++) {
          if (highest === index + 1 &amp;&amp; $(`#${gateIds[index]}`).checked) highest++;
        }
        $(&#x27;#el-ladder&#x27;).innerHTML = levels.map(([label, claim, gate], index) =&gt; {
          const reached = index + 1 &lt;= highest;
          const frontier = index + 1 === highest;
          return `&lt;div class=&quot;el-level&quot; data-reached=&quot;${reached}&quot; data-frontier=&quot;${frontier}&quot;&gt;&lt;span class=&quot;el-number&quot;&gt;LEVEL ${index + 1}&lt;/span&gt;&lt;strong&gt;${reached ? &#x27;✓&#x27; : &#x27;—&#x27;} ${label}&lt;/strong&gt;&lt;span&gt;${reached ? claim : gate}&lt;/span&gt;&lt;/div&gt;`;
        }).join(&#x27;&#x27;);
        $(&#x27;#el-claim&#x27;).textContent = levels[highest - 1][1];
        $(&#x27;#el-block&#x27;).textContent = highest &lt; 8 ? `Blocked next: ${levels[highest][2]}` : &#x27;All declared gates satisfied&#x27;;
      }
      root.querySelectorAll(&#x27;input&#x27;).forEach(control =&gt; control.addEventListener(&#x27;input&#x27;, render));
      render();
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
