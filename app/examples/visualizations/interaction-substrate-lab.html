    (() =&gt; {

      };
      const cVectors = {
        &#x27;0,0&#x27;: &#x27;16981056525137609861&#x27;,
        &#x27;0,1&#x27;: &#x27;14748741118170020452&#x27;,
        &#x27;1,0&#x27;: &#x27;11289045597036932164&#x27;,
        &#x27;1,1&#x27;: &#x27;13521361004004521573&#x27;

      const dims = [
        [&#x27;domain&#x27;, &#x27;Domain-valid&#x27;, &#x27;declared action&#x27;],
        [&#x27;capable&#x27;, &#x27;Capable&#x27;, &#x27;required resources&#x27;],
        [&#x27;permitted&#x27;, &#x27;Permitted&#x27;, &#x27;role authority&#x27;],
        [&#x27;enabled&#x27;, &#x27;Enabled&#x27;, &#x27;state preconditions&#x27;],
        [&#x27;reachable&#x27;, &#x27;Reachable&#x27;, &#x27;target within horizon&#x27;],
        [&#x27;exposed&#x27;, &#x27;Exposed&#x27;, &#x27;executable path shown&#x27;],
        [&#x27;signaled&#x27;, &#x27;Signaled&#x27;, &#x27;operation indicated&#x27;],
        [&#x27;believed&#x27;, &#x27;Believed&#x27;, &#x27;participant report&#x27;],
        [&#x27;selected&#x27;, &#x27;Selected&#x27;, &#x27;attempt in trace&#x27;],
        [&#x27;executed&#x27;, &#x27;Executed&#x27;, &#x27;transition committed&#x27;],
        [&#x27;successful&#x27;, &#x27;Successful&#x27;, &#x27;explicit outcome&#x27;],
        [&#x27;reversible&#x27;, &#x27;Reversible&#x27;, &#x27;exact round trip&#x27;]
      ];
      const dimGroups = [
        [&#x27;Structural availability&#x27;, [&#x27;domain&#x27;, &#x27;capable&#x27;, &#x27;permitted&#x27;, &#x27;enabled&#x27;, &#x27;reachable&#x27;]],
        [&#x27;Projection and belief&#x27;, [&#x27;exposed&#x27;, &#x27;signaled&#x27;, &#x27;believed&#x27;]],
        [&#x27;Trace and consequence&#x27;, [&#x27;selected&#x27;, &#x27;executed&#x27;, &#x27;successful&#x27;, &#x27;reversible&#x27;]]
      ];
      let state = { position: 0, locked: 0 };
      let trace = [];

      function allowed(person, action) {
        return (action.roles &amp; (1 &lt;&lt; person.role)) !== 0;
      }
      function capable(person, action) {
        return (person.caps &amp; action.cap) === action.cap;
      }
      function sameState(a, b) {
        return a.position === b.position &amp;&amp; a.locked === b.locked;
      }
      function successors(source, person) {
        const next = [];
        Object.values(actions).forEach(action =&gt; {
          if (capable(person, action) &amp;&amp; allowed(person, action) &amp;&amp; action.enabled(source)) {
            const candidate = action.apply(source);
            if (!next.some(value =&gt; sameState(value, candidate))) next.push(candidate);
          }
        });
        return next;
      }
      function reachable(source, person, target, horizon) {
        const queue = [{ state: source, depth: 0 }];
        const seen = new Set([`${source.position},${source.locked}`]);
        while (queue.length) {
          const current = queue.shift();
          if (target(current.state)) return true;
          if (current.depth &gt;= horizon) continue;
          successors(current.state, person).forEach(next =&gt; {
            const key = `${next.position},${next.locked}`;
            if (!seen.has(key)) {
              seen.add(key);
              queue.push({ state: next, depth: current.depth + 1 });
            }
          });
        }
        return false;
      }
      function reversible(source, person, action) {
        const reverse = actions[action.reverse];
        if (!capable(person, action) || !allowed(person, action) || !action.enabled(source)) return false;
        const changed = action.apply(source);
        if (!capable(person, reverse) || !allowed(person, reverse) || !reverse.enabled(changed)) return false;
        return sameState(reverse.apply(changed), source);
      }
      function hashState(source) {
        const mask = (1n &lt;&lt; 64n) - 1n;
        let hash = 14695981039346656037n;
        hash = ((hash ^ 2n) * 1099511628211n) &amp; mask;
        [source.position, source.locked].forEach(number =&gt; {
          let value = BigInt(number) &amp; mask;
          for (let byte = 0n; byte &lt; 8n; byte++) {
            hash = ((hash ^ ((value &gt;&gt; (byte * 8n)) &amp; 255n)) * 1099511628211n) &amp; mask;
          }
        });
        return hash.toString();
      }
      function profile() {
        const personKey = $(&#x27;#cis-participant&#x27;).value;
        const actionKey = $(&#x27;#cis-action&#x27;).value;
        const person = participants[personKey];
        const action = actions[actionKey];
        const selected = trace.some(event =&gt; event.person === personKey &amp;&amp; event.action === actionKey);
        const executed = trace.some(event =&gt; event.person === personKey &amp;&amp; event.action === actionKey &amp;&amp; event.executed);
        const matching = trace.filter(event =&gt; event.person === personKey &amp;&amp; event.action === actionKey);
        const successful = matching.some(event =&gt; event.executed &amp;&amp; event.outcome === &#x27;success&#x27;) ? true :
          matching.some(event =&gt; event.executed &amp;&amp; event.outcome === &#x27;failure&#x27;) ? false : null;
        return {
          domain: true,
          capable: capable(person, action),
          permitted: allowed(person, action),
          enabled: action.enabled(state),
          reachable: reachable(state, person, action.target, Number($(&#x27;#cis-horizon&#x27;).value)),

        const laneY = [34, 78, 122];
        const labels = [&#x27;Alice&#x27;, &#x27;Root&#x27;, &#x27;Visitor&#x27;];
        let markup = &#x27;&lt;desc id=&quot;cis-trace-desc&quot;&gt;Events appear in participant lanes as actions are attempted.&lt;/desc&gt;&#x27;;
        labels.forEach((label, index) =&gt; {
          markup += `&lt;text class=&quot;cis-muted-label&quot; x=&quot;6&quot; y=&quot;${laneY[index] + 4}&quot;&gt;${label}&lt;/text&gt;&lt;line class=&quot;cis-lane&quot; x1=&quot;62&quot; y1=&quot;${laneY[index]}&quot; x2=&quot;710&quot; y2=&quot;${laneY[index]}&quot;&gt;&lt;/line&gt;`;
        });
        trace.forEach((event, index) =&gt; {
          const x = 82 + index * Math.min(56, 610 / Math.max(1, trace.length));
          const y = laneY[participants[event.person].lane];
          const eventClass = !event.executed ? &#x27;cis-event-fail&#x27; : event.outcome === &#x27;success&#x27; ? &#x27;cis-event-ok&#x27; : &#x27;cis-event-unknown&#x27;;
          markup += `&lt;line class=&quot;cis-event-stem&quot; x1=&quot;${x}&quot; y1=&quot;${y}&quot; x2=&quot;${x}&quot; y2=&quot;${y - 14}&quot;&gt;&lt;/line&gt;&lt;circle class=&quot;${eventClass}&quot; cx=&quot;${x}&quot; cy=&quot;${y}&quot; r=&quot;6&quot;&gt;&lt;/circle&gt;&lt;text class=&quot;cis-muted-label&quot; x=&quot;${x}&quot; y=&quot;${y - 18}&quot; text-anchor=&quot;middle&quot;&gt;${event.action}&lt;/text&gt;`;
        });
        svg.innerHTML = markup;
      }
      function render() {
        const current = profile();
        const systemExecutable = current.domain &amp;&amp; current.capable &amp;&amp; current.permitted &amp;&amp; current.enabled;
        const projectedAvailable = systemExecutable &amp;&amp; current.exposed;
        const beliefAligned = current.believed === projectedAvailable;
        $(&#x27;#cis-horizon-value&#x27;).textContent = $(&#x27;#cis-horizon&#x27;).value;
        $(&#x27;#cis-door-panel&#x27;).classList.toggle(&#x27;is-open&#x27;, state.position === 1);
        $(&#x27;#cis-lock-mark&#x27;).style.display = state.locked === 1 ? &#x27;&#x27; : &#x27;none&#x27;;
        $(&#x27;#cis-state-label&#x27;).textContent = `${state.position ? &#x27;open&#x27; : &#x27;closed&#x27;} · ${state.locked ? &#x27;locked&#x27; : &#x27;unlocked&#x27;}`;
        $(&#x27;#cis-position-value&#x27;).textContent = state.position ? &#x27;open&#x27; : &#x27;closed&#x27;;
        $(&#x27;#cis-lock-value&#x27;).textContent = state.locked ? &#x27;engaged&#x27; : &#x27;released&#x27;;
        $(&#x27;#cis-projection-value&#x27;).textContent = `${$(&#x27;#cis-action&#x27;).value}: ${current.exposed ? &#x27;exposed&#x27; : &#x27;hidden&#x27;}, ${current.signaled ? &#x27;signaled&#x27; : &#x27;unsignaled&#x27;}`;
        const hash = hashState(state);
        const expected = cVectors[`${state.position},${state.locked}`];
        const parity = hash === expected;
        $(&#x27;#cis-parity-mark&#x27;).classList.toggle(&#x27;is-pass&#x27;, parity);
        $(&#x27;#cis-parity-mark&#x27;).textContent = parity ? &#x27;✓&#x27; : &#x27;×&#x27;;
        $(&#x27;#cis-parity-label&#x27;).textContent = parity ? &#x27;Matches C conformance vector&#x27; : &#x27;C conformance mismatch&#x27;;
        $(&#x27;#cis-hash&#x27;).textContent = `state hash ${hash}`;
        const verdict = (selector, value) =&gt; {
          const element = $(selector);
          element.dataset.status = value ? &#x27;yes&#x27; : &#x27;no&#x27;;
          element.textContent = value ? &#x27;Yes&#x27; : &#x27;No&#x27;;
        };
        verdict(&#x27;#cis-executable-verdict&#x27;, systemExecutable);
        verdict(&#x27;#cis-presented-verdict&#x27;, projectedAvailable);
        verdict(&#x27;#cis-belief-verdict&#x27;, beliefAligned);
        let reason = &#x27;All execution gates pass.&#x27;;
        if (!current.capable) reason = &#x27;Blocked because the participant lacks the required capability.&#x27;;
        else if (!current.permitted) reason = &#x27;Blocked because the participant role is not permitted.&#x27;;
        else if (!current.enabled) reason = &#x27;Blocked because the current state does not satisfy the action preconditions.&#x27;;
        else if (!current.exposed) reason = &#x27;Executable in the system, but this projection does not expose an action path.&#x27;;
        else if (!current.signaled) reason = &#x27;Exposed and executable, but the projection does not signal the action.&#x27;;
        else if (!beliefAligned) reason = &#x27;The participant report disagrees with projected availability.&#x27;;
        $(&#x27;#cis-verdict-reason&#x27;).textContent = reason;
        $(&#x27;#cis-opportunity&#x27;).innerHTML = dimGroups.map(([groupLabel, keys]) =&gt; {
          const items = keys.map(key =&gt; {
            const dimension = dims.find(([dimensionKey]) =&gt; dimensionKey === key);
            const value = current[key];
            const status = value === null ? &#x27;unknown&#x27; : value ? &#x27;yes&#x27; : &#x27;no&#x27;;
            const mark = status === &#x27;yes&#x27; ? &#x27;✓&#x27; : status === &#x27;no&#x27; ? &#x27;×&#x27; : &#x27;?&#x27;;

          }).join(&#x27;&#x27;);
          return `&lt;div class=&quot;cis-dim-group&quot;&gt;&lt;div class=&quot;cis-section-label&quot;&gt;${groupLabel}&lt;/div&gt;&lt;div class=&quot;cis-dim-row&quot;&gt;${items}&lt;/div&gt;&lt;/div&gt;`;
        }).join(&#x27;&#x27;);
        $(&#x27;#cis-selected-detail&#x27;).textContent = trace.length ?
          `${trace.length} recorded selection${trace.length === 1 ? &#x27;&#x27; : &#x27;s&#x27;} · last: ${trace[trace.length - 1].result} · outcome ${trace[trace.length - 1].outcome}` :
          &#x27;No action selected in this episode.&#x27;;

      function attempt() {
        const personKey = $(&#x27;#cis-participant&#x27;).value;
        const actionKey = $(&#x27;#cis-action&#x27;).value;

        let executed = false;

        else if (!allowed(person, action)) result = &#x27;permission denied&#x27;;
        else if (!action.enabled(state)) result = &#x27;precondition unsatisfied&#x27;;

        render();

      root.querySelectorAll(&#x27;select, input&#x27;).forEach(control =&gt; control.addEventListener(&#x27;input&#x27;, render));
      $(&#x27;#cis-attempt&#x27;).addEventListener(&#x27;click&#x27;, attempt);
      $(&#x27;#cis-reset&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        state = { position: 0, locked: 0 };

  &lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);

        .split(/\s+/)

    );

  };

    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }

      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),

          padding: tooltipGap,

              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,

      .then(({ x, y }) =&gt; {

          return;

        floating.style.visibility = &quot;visible&quot;;

      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;

    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);

    }

    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }

    }

    }

    }

    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);

  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });

&lt;/script&gt;
